<!DOCTYPE html>
<html>
<head>
    <title>Banglore Home Price Prediction</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="app.js"></script>
	<link rel="stylesheet" href="app.css">
</head>
<body>
<nav class="navbar">
    <div class="logo">BHP Prediction</div>
    <div class="nav-links" id="navLinks">
        <!-- Will be populated by JS -->
    </div>
</nav>

<div class="img"></div>

<!-- Auth Forms -->
<div id="authContainer" class="auth-container" style="display: none;">
    <div class="auth-box" id="loginBox">
        <h2>Login</h2>
        <input type="email" id="loginEmail" placeholder="Email">
        <input type="password" id="loginPassword" placeholder="Password">
        <button onclick="onLogin()">Login</button>
        <p>Don't have an account? <a href="#" onclick="toggleAuth('signup')">Sign Up</a></p>
        <p><a href="#" onclick="toggleAuth('forgot')">Forgot Password?</a></p>
    </div>

    <div class="auth-box" id="signupBox" style="display: none;">
        <h2>Sign Up</h2>
        <input type="text" id="signupUser" placeholder="Username">
        <input type="email" id="signupEmail" placeholder="Email">
        <input type="password" id="signupPassword" placeholder="Password">
        <button onclick="onSignup()">Sign Up</button>
        <p>Already have an account? <a href="#" onclick="toggleAuth('login')">Login</a></p>
    </div>

    <div class="auth-box" id="forgotBox" style="display: none;">
        <h2>Forgot Password</h2>
        <input type="email" id="forgotEmail" placeholder="Email">
        <button onclick="onForgotPassword()">Send Reset Link</button>
        <p><a href="#" onclick="toggleAuth('login')">Back to Login</a></p>
    </div>
</div>

<!-- Main App -->
<div id="mainApp" style="display: none;">
    <form class="form">
        <h2>Area (Square Feet)</h2>
        <input class="area"  type="text" id="uiSqft" class="floatLabel" name="Squareft" value="1000">
        <h2>BHK</h2>
        <div class="switch-field">
            <input type="radio" id="radio-bhk-1" name="uiBHK" value="1"/>
            <label for="radio-bhk-1">1</label>
            <input type="radio" id="radio-bhk-2" name="uiBHK" value="2" checked/>
            <label for="radio-bhk-2">2</label>
            <input type="radio" id="radio-bhk-3" name="uiBHK" value="3"/>
            <label for="radio-bhk-3">3</label>
            <input type="radio" id="radio-bhk-4" name="uiBHK" value="4"/>
            <label for="radio-bhk-4">4</label>
            <input type="radio" id="radio-bhk-5" name="uiBHK" value="5"/>
            <label for="radio-bhk-5">5</label>
        </div>
        </form>
    <form class="form">
        <h2>Bath</h2>
        <div class="switch-field">
            <input type="radio" id="radio-bath-1" name="uiBathrooms" value="1"/>
            <label for="radio-bath-1">1</label>
            <input type="radio" id="radio-bath-2" name="uiBathrooms" value="2" checked/>
            <label for="radio-bath-2">2</label>
            <input type="radio" id="radio-bath-3" name="uiBathrooms" value="3"/>
            <label for="radio-bath-3">3</label>
            <input type="radio" id="radio-bath-4" name="uiBathrooms" value="4"/>
            <label for="radio-bath-4">4</label>
            <input type="radio" id="radio-bath-5" name="uiBathrooms" value="5"/>
            <label for="radio-bath-5">5</label>
        </div>
            <h2>Location</h2>
        <div>
      <select class="location" name="" id="uiLocations">
        <option value="" disabled="disabled" selected="selected">Choose a Location</option>
            <option>Electronic City</option>
            <option>Rajaji Nagar</option>
      </select>
    </div>
        <button class="submit" onclick="onClickedEstimatePrice()" type="button">Estimate Price</button>
        <div id="uiEstimatedPrice" class="result">	<h2></h2> </div>
    </form>
</div>
</body>
</html>
